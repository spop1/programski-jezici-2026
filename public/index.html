<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FilmBox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- alt+shift+f -> formatiranje -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        #movies {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            justify-content: center;
        }

        .card {
            width: 18rem;
        }

        /* .movie-card {
                width: 18rem;
            } */
    </style>
</head>

<body data-bs-theme="dark" bg-body-tertiary>
    <nav class="navbar navbar-expand-lg mb-3">
        <div class="container">
            <a class="navbar-brand" href="./index.html"><i class="fa-solid fa-bowl-food"></i>FilmBox</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">
                            <i class="fa-duotone fa-solid fa-house"></i>Početna</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="list.html">
                            <i class="fa-solid fa-table-list"></i>
                            List
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="cinema.html">
                            <i class="fa-solid fa-movie"></i>
                            <i class="fa-solid fa-clapperboard"></i>Bioskopi
                        </a>
                    </li>

                </ul>

            </div>
        </div>
    </nav>
    <div class="container">
        <div id="movies">

        </div>
        <pre id="json"></pre>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
        </script>

    <script>
        fetch('https://movie.pequla.com/api/movie')
            .then(rsp => rsp.json())
            .then(data => {
                const list = document.getElementById('movies')
                let sorted = data.sort((m1, m2) => {
                    return m2.movieId - m1.movieId
                })
                let content = ''
                for (let m of sorted) {
                    content += ` <div class="card">
                    <img src="${m.poster}" class="card-img-top" alt="...">
                    <div class="card-body">
                        <h5 class="card-title">${m.title}</h5>
                        <p class="card-text">${m.shortDescription}</p>
                    </div>    
                        <div class="card-footer ">
                            <a href="./details.html?id=${m.movieId}" class="btn btn-primary">
                                <i class="fa-solid fa-up-right-from-square"></i>Details
                                </a>
                        </div>
                </div> 
                `
                }
                list.innerHTML = content
            })
    </script>
</body>

</html>
